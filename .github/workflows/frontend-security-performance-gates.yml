name: Frontend Security and Performance Gates

on:
  pull_request:
    paths:
      - "**"
      - ".github/workflows/frontend-security-performance-gates.yml"
  push:
    branches: [main, master]
    paths:
      - "**"
      - ".github/workflows/frontend-security-performance-gates.yml"

jobs:
  frontend-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: CSP gate
        run: npm run check:csp

      - name: Build
        run: npm run build:ci

      - name: Bundle budget gate
        run: npm run check:bundle
